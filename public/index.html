<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.15);
      --success: #22c55e;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #334155;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 10px;
      color: var(--text);
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .option:hover {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .option input {
      margin: 0;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .option.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .progress {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .step-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }

    .btn-secondary {
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .finish-early-link {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      background: none;
      border: none;
      padding: 6px 0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .finish-early-link:hover {
      color: var(--text);
    }

    .extra-question {
      margin-top: 14px;
    }

    .extra-question textarea {
      min-height: 80px;
      resize: vertical;
    }

    .hidden {
      display: none !important;
    }

    .done-msg {
      text-align: center;
      padding: 32px 0;
    }

    .done-msg h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      margin: 0 0 8px;
      color: var(--success);
    }

    .done-msg p {
      color: var(--text-muted);
      margin: 0;
    }

    .error-msg {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .lang-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .lang-bar button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .lang-bar button:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .lang-bar button.active {
      color: var(--text);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    html[lang='zh'] body {
      font-family: 'Noto Sans SC', 'DM Sans', system-ui, sans-serif;
    }

    html[lang='zh'] h1 {
      font-family: 'Noto Sans SC', 'Outfit', sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="lang-bar" role="group" aria-label="Language">
      <span id="lang-label">Language</span>
      <button type="button" id="lang-en" class="active">English</button>
      <button type="button" id="lang-zh">中文</button>
    </div>
    <h1 id="page-title">Student Quiz</h1>
    <p class="subtitle" id="page-subtitle">Answer a few questions. Your report will be saved on this computer.</p>

    <div id="name-step" class="card">
      <label for="student-name" id="label-student-name">English / Chinese name</label>
      <input type="text" id="student-name" placeholder="e.g. Alex or 小明" autocomplete="name" />
      <div class="buttons" style="margin-top: 16px;">
        <button type="button" class="btn btn-primary" id="start-btn">Start quiz</button>
      </div>
    </div>

    <div id="quiz-step" class="hidden">
      <div class="progress">
        <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
      </div>
      <div class="card">
        <p class="step-info" id="step-info">Question 1 of 10</p>
        <div id="question-container"></div>
        <div class="buttons">
          <button type="button" class="btn btn-secondary" id="prev-btn">Previous</button>
          <button type="button" class="btn btn-primary" id="next-btn">Next</button>
          <button type="button" class="finish-early-link" id="finish-early-btn">Finish early</button>
        </div>
      </div>
    </div>

    <div id="done-step" class="card hidden">
      <div class="done-msg">
        <h2 id="done-title">All done</h2>
        <p id="done-text">Your answers and report have been saved on this computer.</p>
        <p id="save-error" class="error-msg hidden"></p>
      </div>
    </div>
  </div>

  <script>
    const LANG_KEY = 'quiz-lang';

    const STR = {
      en: {
        langLabel: 'Language',
        pageTitle: 'Student Quiz',
        pageSubtitle: 'Answer a few questions. Your report will be saved on this computer.',
        labelStudentName: 'English / Chinese name',
        placeholderName: 'e.g. Alex or 小明',
        startQuiz: 'Start quiz',
        prev: 'Previous',
        next: 'Next',
        finish: 'Finish',
        finishEarly: 'Finish early',
        confirmFinish: 'Finish the quiz now? Your answers so far will be saved.',
        doneTitle: 'All done',
        doneText: 'Your answers and report have been saved on this computer.',
        notePrefix: 'Note:',
        saveError: 'Report could not be saved on the server: ',
        extraPlaceholder: 'Your question...',
        pdfTitle: 'Student Quiz Report',
        pdfStudent: 'Student:',
        pdfDate: 'Date:',
        pdfScore: 'Score:',
        pdfAnswers: 'Answers',
        pdfAnswer: 'Answer:',
        pdfAdditional: 'Additional:',
        stepQuestion: (n, total) => `Question ${n} of ${total}`,
      },
      zh: {
        langLabel: '语言',
        pageTitle: '学生问卷',
        pageSubtitle: '请回答几个问题。报告将保存在本机。',
        labelStudentName: '英文 / 中文姓名',
        placeholderName: '例如 Alex 或 小明',
        startQuiz: '开始问卷',
        prev: '上一题',
        next: '下一题',
        finish: '完成',
        finishEarly: '提前结束',
        confirmFinish: '现在结束问卷吗？已填写的答案仍会保存。',
        doneTitle: '已完成',
        doneText: '你的答案和报告已保存在本机。',
        notePrefix: '提示：',
        saveError: '无法保存到服务器：',
        extraPlaceholder: '你的问题…',
        pdfTitle: '学生问卷报告',
        pdfStudent: '学生：',
        pdfDate: '日期：',
        pdfScore: '分数：',
        pdfAnswers: '答案',
        pdfAnswer: '回答：',
        pdfAdditional: '补充：',
        stepQuestion: (n, total) => `第 ${n} / ${total} 题`,
      },
    };

    function getLang() {
      return localStorage.getItem(LANG_KEY) === 'zh' ? 'zh' : 'en';
    }

    function t(key) {
      const row = STR[getLang()];
      return row[key] !== undefined ? row[key] : STR.en[key];
    }

    function questionText(q) {
      return getLang() === 'zh' && q.textZh ? q.textZh : q.text;
    }

    function optionLabel(q, value) {
      if (getLang() === 'zh' && q.optionsZh) {
        const i = q.options.indexOf(value);
        return i >= 0 ? q.optionsZh[i] : value;
      }
      return value;
    }

    function extraLabelText(q) {
      return getLang() === 'zh' && q.extraLabelZh ? q.extraLabelZh : q.extraLabel;
    }

    const questions = [
      {
        id: 'wall_maze_difficult',
        text: 'Was the wall maze difficult?',
        textZh: '迷宫难吗？',
        type: 'choice',
        options: ['Yes', 'No', 'Somewhat'],
        optionsZh: ['是', '否', '有点'],
        scoreMap: { Yes: 0, No: 2, Somewhat: 1 },
      },
      {
        id: 'wall_maze_understand',
        text: 'Did you understand how to finish the wall maze?',
        textZh: '你是否理解如何完成迷宫？',
        type: 'choice',
        options: ['Yes', 'No', 'Partially'],
        optionsZh: ['是', '否', '部分理解'],
        scoreMap: { Yes: 2, No: 0, Partially: 1 },
      },
      {
        id: 'wall_maze_finish',
        text: 'Did you finish the wall maze?',
        textZh: '你完成迷宫了吗？',
        type: 'choice',
        options: ['Yes', 'No'],
        optionsZh: ['是', '否'],
        scoreMap: { Yes: 2, No: 0 },
      },
      {
        id: 'coral_reef_difficult',
        text: 'Was coral reef clean up difficult?',
        textZh: '珊瑚礁清理难吗？',
        type: 'choice',
        options: ['Yes', 'No', 'Somewhat'],
        optionsZh: ['是', '否', '有点'],
        scoreMap: { Yes: 0, No: 2, Somewhat: 1 },
      },
      {
        id: 'coral_reef_loop',
        text: 'Did you use a loop?',
        textZh: '你使用了循环吗？',
        type: 'choice',
        options: ['Yes', 'No'],
        optionsZh: ['是', '否'],
        scoreMap: { Yes: 2, No: 0 },
      },
      {
        id: 'coral_reef_finish',
        text: 'Did you finish the coral reef clean up?',
        textZh: '你完成珊瑚礁清理了吗？',
        type: 'choice',
        options: ['Yes', 'No'],
        optionsZh: ['是', '否'],
        scoreMap: { Yes: 2, No: 0 },
      },
      {
        id: 'max_trash',
        text: 'What is the maximum amount of trash you have collected?',
        textZh: '你收集过的最大垃圾量是多少？',
        type: 'choice',
        options: ['0 kg', '1–25 kg', '26–50 kg', '51–75 kg', '76–100 kg', '101–150 kg', 'More than 150 kg'],
        optionsZh: ['0 公斤', '1–25 公斤', '26–50 公斤', '51–75 公斤', '76–100 公斤', '101–150 公斤', '超过 150 公斤'],
        scoreMap: { '0 kg': 0, '1–25 kg': 1, '26–50 kg': 2, '51–75 kg': 3, '76–100 kg': 4, '101–150 kg': 5, 'More than 150 kg': 6 },
      },
      {
        id: 'coral_reef_understand',
        text: 'Did you understand how to collect trash in the coral reef clean up?',
        textZh: '你是否理解如何在珊瑚礁清理中收集垃圾？',
        type: 'choice',
        options: ['Yes', 'No', 'Partially'],
        optionsZh: ['是', '否', '部分理解'],
        scoreMap: { Yes: 2, No: 0, Partially: 1 },
      },
      {
        id: 'robot_interest',
        text: 'Are you interested in building a robot?',
        textZh: '你有兴趣制作机器人吗？',
        type: 'choice',
        options: ['Yes', 'No', 'Maybe'],
        optionsZh: ['是', '否', '也许'],
        scoreMap: { Yes: 2, No: 0, Maybe: 1 },
      },
      {
        id: 'other_questions',
        text: 'Do you have other questions?',
        textZh: '你还有其他问题吗？',
        type: 'choice-with-extra',
        options: ['Yes', 'No'],
        optionsZh: ['是', '否'],
        scoreMap: { Yes: 0, No: 1 },
        extraLabel: 'If yes, what would you like to know? (optional)',
        extraLabelZh: '若有，你想了解什么？（可选）',
      },
    ];

    const maxScore = questions.reduce((sum, q) => {
      const vals = Object.values(q.scoreMap || {});
      return sum + (vals.length ? Math.max(...vals) : 0);
    }, 0);

    let currentStep = 0;
    let answers = {};
    const nameInput = document.getElementById('student-name');
    const startBtn = document.getElementById('start-btn');
    const nameStep = document.getElementById('name-step');
    const quizStep = document.getElementById('quiz-step');
    const doneStep = document.getElementById('done-step');
    const questionContainer = document.getElementById('question-container');
    const progressBar = document.getElementById('progress-bar');
    const stepInfo = document.getElementById('step-info');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const finishEarlyBtn = document.getElementById('finish-early-btn');
    const saveError = document.getElementById('save-error');
    const pageTitleEl = document.getElementById('page-title');
    const pageSubtitleEl = document.getElementById('page-subtitle');
    const labelStudentNameEl = document.getElementById('label-student-name');
    const doneTitleEl = document.getElementById('done-title');
    const doneTextEl = document.getElementById('done-text');
    const langLabelEl = document.getElementById('lang-label');
    const langEnBtn = document.getElementById('lang-en');
    const langZhBtn = document.getElementById('lang-zh');

    function applyChromeI18n() {
      const lang = getLang();
      document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
      langLabelEl.textContent = t('langLabel');
      langEnBtn.classList.toggle('active', lang === 'en');
      langZhBtn.classList.toggle('active', lang === 'zh');
      pageTitleEl.textContent = t('pageTitle');
      pageSubtitleEl.textContent = t('pageSubtitle');
      labelStudentNameEl.textContent = t('labelStudentName');
      nameInput.placeholder = t('placeholderName');
      startBtn.textContent = t('startQuiz');
      prevBtn.textContent = t('prev');
      finishEarlyBtn.textContent = t('finishEarly');
      doneTitleEl.textContent = t('doneTitle');
      doneTextEl.textContent = t('doneText');
      document.title = t('pageTitle');
      const onQuiz = !quizStep.classList.contains('hidden');
      if (onQuiz) {
        renderQuestion();
      } else {
        nextBtn.textContent = t('next');
      }
    }

    langEnBtn.addEventListener('click', () => {
      localStorage.setItem(LANG_KEY, 'en');
      applyChromeI18n();
    });
    langZhBtn.addEventListener('click', () => {
      localStorage.setItem(LANG_KEY, 'zh');
      applyChromeI18n();
    });

    function showStep(step) {
      nameStep.classList.toggle('hidden', step !== 'name');
      quizStep.classList.toggle('hidden', step !== 'quiz');
      doneStep.classList.toggle('hidden', step !== 'done');
    }

    function renderQuestion() {
      const q = questions[currentStep];
      if (!q) return;

      progressBar.style.width = ((currentStep + 1) / questions.length) * 100 + '%';
      stepInfo.textContent = STR[getLang()].stepQuestion(currentStep + 1, questions.length);

      let html = `<label>${questionText(q)}</label>`;

      if (q.type === 'choice' || q.type === 'choice-with-extra') {
        html += '<div class="options">';
        q.options.forEach((opt) => {
          const checked = answers[q.id] === opt ? ' checked' : '';
          const label = optionLabel(q, opt);
          html += `
            <label class="option ${answers[q.id] === opt ? 'selected' : ''}">
              <input type="radio" name="${q.id}" value="${opt}"${checked} />
              <span>${label}</span>
            </label>
          `;
        });
        html += '</div>';
        if (q.type === 'choice-with-extra' && q.extraLabel) {
          const extraId = q.id + '_extra';
          html += `
            <div class="extra-question">
              <label for="${extraId}">${extraLabelText(q)}</label>
              <textarea id="${extraId}" placeholder="${t('extraPlaceholder')}">${answers[extraId] || ''}</textarea>
            </div>
          `;
        }
      }

      questionContainer.innerHTML = html;

      questionContainer.querySelectorAll('.option').forEach((el) => {
        el.addEventListener('click', () => {
          const radio = el.querySelector('input');
          if (radio) {
            radio.checked = true;
            answers[q.id] = radio.value;
            questionContainer.querySelectorAll('.option').forEach((o) => o.classList.remove('selected'));
            el.classList.add('selected');
            nextBtn.disabled = false;
          }
        });
      });

      const extraText = questionContainer.querySelector('textarea');
      if (extraText) {
        extraText.addEventListener('input', () => {
          answers[q.id + '_extra'] = extraText.value.trim();
        });
      }

      prevBtn.disabled = currentStep === 0;
      nextBtn.disabled = answers[q.id] == null;
      nextBtn.textContent = currentStep === questions.length - 1 ? t('finish') : t('next');
    }

    function collectAnswers() {
      const result = {};
      questions.forEach((q) => {
        const val = answers[q.id];
        result[q.id] = val !== undefined ? val : null;
        if (q.type === 'choice-with-extra' && answers[q.id + '_extra']) {
          result[q.id + '_extra'] = answers[q.id + '_extra'];
        }
      });
      return result;
    }

    function computeScore() {
      let total = 0;
      questions.forEach((q) => {
        const val = answers[q.id];
        if (val != null && q.scoreMap && q.scoreMap[val] != null) {
          total += q.scoreMap[val];
        }
      });
      return total;
    }

    function buildPdfBlob(studentName, answersObj, score) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const lineH = 7;
      let y = 20;
      const L = STR[getLang()];

      doc.setFontSize(18);
      doc.text(L.pdfTitle, 20, y);
      y += lineH + 4;

      doc.setFontSize(11);
      doc.text(`${L.pdfStudent} ${studentName}`, 20, y);
      y += lineH;
      doc.text(`${L.pdfDate} ${new Date().toLocaleString()}`, 20, y);
      y += lineH;
      doc.text(`${L.pdfScore} ${score} / ${maxScore}`, 20, y);
      y += lineH + 6;

      doc.setFontSize(12);
      doc.text(L.pdfAnswers, 20, y);
      y += lineH + 2;

      doc.setFontSize(10);
      questions.forEach((q) => {
        const val = answersObj[q.id];
        const extra = answersObj[q.id + '_extra'];
        const line = questionText(q);
        const answerDisplay = val != null ? optionLabel(q, val) : '—';
        const answerLine = `${L.pdfAnswer} ${answerDisplay}`;
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(line, 20, y);
        y += lineH;
        doc.text(answerLine, 24, y);
        y += lineH;
        if (extra) {
          doc.text(`${L.pdfAdditional} ${extra}`, 24, y);
          y += lineH;
        }
        y += 2;
      });

      return doc.output('datauristring').split(',')[1];
    }

    function showDone() {
      showStep('done');
      saveError.classList.add('hidden');
    }

    async function submitQuiz() {
      const studentName = nameInput.value.trim() || 'Anonymous';
      const answersObj = collectAnswers();
      const score = computeScore();
      const pdfBase64 = buildPdfBlob(studentName, answersObj, score);

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            studentName,
            answers: answersObj,
            score,
            maxScore,
            pdfBase64,
            questions: questions.map((q) => ({ id: q.id, text: questionText(q) }))
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Save failed');
        showDone();
        const notes = [data.latexWarning, data.emailWarning].filter(Boolean);
        if (notes.length) {
          saveError.textContent = `${t('notePrefix')} ${notes.join(' ')}`;
          saveError.classList.remove('hidden');
        }
      } catch (err) {
        showDone();
        saveError.textContent = t('saveError') + (err.message || 'Unknown error');
        saveError.classList.remove('hidden');
      }
    }

    startBtn.addEventListener('click', () => {
      if (!nameInput.value.trim()) {
        nameInput.focus();
        return;
      }
      showStep('quiz');
      currentStep = 0;
      answers = {};
      renderQuestion();
    });

    nextBtn.addEventListener('click', () => {
      if (currentStep === questions.length - 1) {
        nextBtn.disabled = true;
        submitQuiz();
        return;
      }
      currentStep++;
      renderQuestion();
    });

    prevBtn.addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        renderQuestion();
      }
    });

    finishEarlyBtn.addEventListener('click', () => {
      if (confirm(t('confirmFinish'))) {
        submitQuiz();
      }
    });

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startBtn.click();
    });

    applyChromeI18n();
  </script>
</body>
</html>
